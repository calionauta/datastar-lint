# GoReleaser configuration for datastar-lint
#
# Usage:
#   1. Tag a release:     git tag -a v0.X.Y -m "Release v0.X.Y"
#   2. Push the tag:      git push origin v0.X.Y
#   3. Run goreleaser:    goreleaser release --clean
#
# Requires GITHUB_TOKEN env var.
#
# Build via Makefile instead of goreleaser's builder to keep ldflags
# logic in one place (see Makefile for build flags).

version: 2

project_name: datastar-lint

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    ldflags:
      - -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^docs:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: calionauta
    name: datastar-lint
  draft: true
  header: |
    ## datastar-lint {{ .Version }}

    ### Changes

